<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        ._card-wrapper {
            display: block;
            text-align: center;
            padding: 30px 50px;
        }
        ._btn {
            padding: 20px;
            min-width: 200px;
            font-size: 30px;
            border: none;
            border-radius: 10px;
            color: white;
            background: gray;
            outline: none;
            cursor: pointer;
        }

        ._card > img {
            height: 250px;
        }

        .lds-heart {
  display: inline-block;
  position: relative;
  width: 80px;
  height: 80px;
  transform: rotate(45deg);
  transform-origin: 40px 40px;
}
.lds-heart div {
  position: absolute;
  top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  width: 80px;
  height: 80px;
  background: #faeda8;
  animation: lds-heart 1.2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
}
.lds-heart div:after,
.lds-heart div:before {
    content: " ";
    position: absolute;
    display: block;
    width: 80px;
    height: 80px;
    background: #faeda8;
}
.lds-heart div:before {
  left: -42px;
  border-radius: 50% 0 0 50%;
}
.lds-heart div:after {
  top: -42px;
  border-radius: 50% 50% 0 0;
}
@keyframes lds-heart {
  0% {
    transform: scale(0.95);
  }
  5% {
    transform: scale(1.1);
  }
  39% {
    transform: scale(0.85);
  }
  45% {
    transform: scale(1);
  }
  60% {
    transform: scale(0.95);
  }
  100% {
    transform: scale(0.9);
  }
}

._card {
    height: 250px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 50px;
}


#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 1;
    background-color: #8E896F;
    opacity: 0;
    visibility: hidden;
}

#result {
    height: auto;
    width: 90%;
    border-radius: 25px;
    background-color: white;
    z-index: 5;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    visibility: hidden;
}
._fade-in {
    transition: all 200ms;
    opacity: .6 !important;
    visibility: visible !important;
}

._fade-in-100 {
    transition: all 500ms;
    opacity: 1 !important;
    visibility: visible !important;
}

.box {
    background-color: #FDF7DA;
    background-image: url('./src/images/bg-result.png');
    background-size: cover;
    border-radius: 10px;
    padding: 35px;
    display: flex;
    align-items: center;
    flex-direction: column;
}

.facebook-share {
  background: #fff;
  color: rgb(87, 207, 244);
  cursor: pointer;
  display: inline-block;
  padding: 1em 2em;
  -webkit-border-radius: 6px;
  border-radius: 6px;
}
._btn-wrapper {
    display: none;
}
._btn-2 {
    padding: 5px 15px;
    font-size: 20px;
    border: none;
    border-radius: 5px;
    color: white;
    background: gray;
    outline: none;
    text-align: center;
    cursor: pointer;
    margin-right: 10px;
        }

        ._top > h3 {
            text-align: center;
            color: #8E896F;
            font-size: 35px;
            margin: 0;
        }

        ._loading {
            position: relative;
            display: block;
            height: 200px;
        }

        ._desc {
            font-size: 25px;
    font-weight: bold;
    text-align: center;
    padding: 20px;
        }

        .desc-wrap {
            display: flex;
            max-width: 1000px;
            padding: 35px 0;
        }

        .pic {
            flex: .5;
            z-index: 5;
            transition: all 300ms;
        }

        #text {
            flex: 1;
            padding-left: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .desc-wrap > .pic > img {
            width: 100%;

        }

        /* ._bg {
            
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 1;
            z-index: 4;
        } */

        ._top, ._loading, ._btn-wrapper, ._desc {
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="overlay"></div>
    <div id="result">
        <div class="box"> 
            <div class="_bg">

            </div>
            <div class="_top">
                <h3 id="topic">
                    แสงสว่างนำชีวิตในปีใหม่นี้ของท่านคือ...
                </h3>
            </div>
            <div class="_loading" id="loading">
                <div class="lds-heart"><div></div></div>
            </div>
            <div class="desc-wrap">
                <div class="pic" id="picture">
                    
                </div>
                <div id="text">

                </div>
            </div>
            <div class="_btn-wrapper" id="btnWrapper">
                <div class="_btn-2" onclick="savepic()">บันทึกภาพ</div>
                <div class="_btn-2" data-js="facebook-share" style="background-color: #1a83de;" onclick="share()">แบ่งปัน</div>
                <div class="_btn-2" onclick="resetApp()">เริ่มใหม่</div>
            </div>
        </div>
    </div>
    <div class="head_qoate">
        <div class="_logo">
            <img src="./src/images/logo.png" alt="">
        </div>
        <div class="_qaote">
            <h1>การ์ดธรรมะ แสงสว่างนำชีวิตในปีใหม่</h1>
        </div>
    </div>
    
    <div class="_card-wrapper">
        <div class="_card">
            <img src="./src/images/card.png" alt="">
            <!-- <div class="lds-heart"><div></div></div> -->
        </div>
        <button class="_btn" onclick="openResult()">
            กดรับข้อธรรม
        </button>
    </div>

    <script>
        function openResult() {
            let loading = document.getElementById('loading');
            let overlay = document.getElementById('overlay');
            let result = document.getElementById('result');
            let btnWrp = document.getElementById("btnWrapper");
            let desc = document.getElementById('text');
            let picture = document.getElementById('picture');
            let topic = document.getElementById('topic');

            loading.style.display = 'inline-block';
            overlay.classList.add('_fade-in');
            result.classList.add('_fade-in-100');
            desc.innerHTML = '';
            picture.innerHTML = '';

            setTimeout(() => {
                btnWrp.style.display = 'flex';
                loading.style.display = 'none';
                desc.innerHTML = this.desc[0];
                picture.innerHTML = `<img src="./src/images/72.jpg" alt="">`;
                topic.innerHTML = 'แสงสว่างนำชีวิตในปีใหม่นี้ของท่านคือ...';
            }, 2000);
        }

        function resetApp() {
            let loading = document.getElementById('loading');
            let overlay = document.getElementById('overlay');
            let result = document.getElementById('result');
            let btnWrp = document.getElementById("btnWrapper");
            let desc = document.getElementById('text');
            let picture = document.getElementById('picture');

            loading.style.display = 'inline-block';
            overlay.classList.remove('_fade-in');
            result.classList.remove('_fade-in-100');
            desc.innerHTML = '';
            picture.innerHTML = '';
            btnWrp.style.display = 'none';
        }

        function share () {
            var facebookShare = document.querySelector('[data-js="facebook-share"]');

            facebookShare.onclick = function(e) {
            e.preventDefault();
            var facebookWindow = window.open('https://www.facebook.com/sharer/sharer.php?u=' + document.URL, 'facebook-popup', 'height=350,width=600');
            if(facebookWindow.focus) { facebookWindow.focus(); }
                return false;
            }
        }

        function savepic () {
            window.open('https://dhanachdev.github.io/pandara/src/images/10.jpg');
        }
        var index = 1;
        var desc = [
            `<span class="_desc">ข้อธรรม 1 "ศีล คือ ใจ"<br>
การบังคับกาย หรือ วาจา ไม่สำคัญเท่า
การที่เราถือศีล นั้นทำให้ใจเราเป็นสุข</span>
- อ.กฤษดาวรรณ (เกซัง ตาวา) -`
        ]
    </script>
</body>
</html>
