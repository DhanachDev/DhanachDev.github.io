<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การ์ดธรรมะ แสงสว่างนำชีวิตในปีใหม่</title>
    <link rel="stylesheet" href="./src/style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300&display=swap" rel="stylesheet">
    <meta property="og:url" content="http://DhanachDev.github.io/pandara" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="แสงสว่างนำชีวิตในปีใหม่นี้ของท่านคือ..." />
    <meta property="og:description" content="รับข้อคิดธรรมะจากมูลนิธิพันดารา เพื่อความเป็นสิริมงคลปี 2564" />
    <meta property="og:image" content="https://dhanachdev.github.io/pandara/src/images/thumbnail.png" />
    <meta name="description" content="มูลนิธิพันดารา, thousands, stars, pandara, ทิเบต, เกซัง, ตาวา, kalsangdawa, ขทิรวัน, kundrolling, kundrol, ling, แสงสว่างนำชีวิต, ปีใหม่, ข้อคิดธรรมะ, ธรรมะ, สงบสุข, จิต, วัชรยาน, ธรรมชาติ, new, year, happy, สิริมงคล">
</head>
<body>
    <div id="overlay"></div>
    <div id="result">
        <div class="box">
            <div class="_top">
                <h3 id="topic">
                    แสงสว่างนำชีวิตในปีใหม่นี้ของท่านคือ...
                </h3>
            </div>
            <div class="_loading" id="loading">
                <div class="lds-heart"><div></div></div>
            </div>
            <div class="desc-wrap">
                <div class="pic" id="picture">
                    
                </div>
                <div id="text">

                </div>
            </div>
            <div class="_btn-wrapper" id="btnWrapper">
                <div class="_btn-2" onclick="savepic()">บันทึกภาพ</div>
                <div class="_btn-2" data-js="facebook-share" style="background-color: #1a83de;" onclick="share()">แบ่งปัน</div>
                <div class="_btn-2" onclick="resetApp()">เริ่มใหม่</div>
            </div>
        </div>
    </div>
    <div class="head_qoate">
        <div class="_logo">
            <img src="./src/images/logo.png" alt="">
        </div>
        <div class="_qaote">
            <h1>การ์ดธรรมะ แสงสว่างนำชีวิตในปีใหม่</h1>
        </div>
    </div>
    
    <div class="_card-wrapper">
        <div class="_card">
            <img src="./src/images/card.png" alt="">
            <!-- <div class="lds-heart"><div></div></div> -->
        </div>
        <button class="_btn" onclick="openResult()">
            กดรับข้อธรรม
        </button>
    </div>

    <script>
        function openResult() {
            let loading = document.getElementById('loading');
            let overlay = document.getElementById('overlay');
            let result = document.getElementById('result');
            let btnWrp = document.getElementById("btnWrapper");
            let desc = document.getElementById('text');
            let picture = document.getElementById('picture');
            let topic = document.getElementById('topic');

            loading.style.display = 'inline-block';
            overlay.classList.add('_fade-in');
            result.classList.add('_fade-in-100');
            desc.innerHTML = '';
            picture.innerHTML = '';

            setTimeout(() => {
                btnWrp.style.display = 'flex';
                loading.style.display = 'none';
                desc.innerHTML = this.desc[0];
                picture.innerHTML = `<img src="./src/images/72.jpg" alt="">`;
                topic.innerHTML = 'แสงสว่างนำชีวิตในปีใหม่นี้ของท่านคือ...';
            }, 2000);
        }

        function resetApp() {
            let loading = document.getElementById('loading');
            let overlay = document.getElementById('overlay');
            let result = document.getElementById('result');
            let btnWrp = document.getElementById("btnWrapper");
            let desc = document.getElementById('text');
            let picture = document.getElementById('picture');

            loading.style.display = 'inline-block';
            overlay.classList.remove('_fade-in');
            result.classList.remove('_fade-in-100');
            desc.innerHTML = '';
            picture.innerHTML = '';
            btnWrp.style.display = 'none';
        }

        function share () {
            var facebookShare = document.querySelector('[data-js="facebook-share"]');

            facebookShare.onclick = function(e) {
            e.preventDefault();
            var facebookWindow = window.open('https://www.facebook.com/sharer/sharer.php?u=' + document.URL, 'facebook-popup', 'height=350,width=600');
            if(facebookWindow.focus) { facebookWindow.focus(); }
                return false;
            }
        }

        function savepic () {
            window.open('https://dhanachdev.github.io/pandara/src/images/10.jpg');
        }
        var index = 1;
        var desc = [
            `<span class="_desc">ข้อธรรม 1 "ศีล คือ ใจ"<br>
การบังคับกาย หรือ วาจา ไม่สำคัญเท่า
การที่เราถือศีล นั้นทำให้ใจเราเป็นสุข</span>
- อ.กฤษดาวรรณ (เกซัง ตาวา) -`
        ]
    </script>
</body>
</html>
